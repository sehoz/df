name: Deploy to CloudBase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm --prefix backend install --no-audit --no-fund

      - name: Install frontend dependencies
        run: npm --prefix frontend install --no-audit --no-fund

      - name: Build backend
        run: npm --prefix backend run build

      - name: Build frontend
        run: npm --prefix frontend run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Login CloudBase CLI
        run: tcb login --apiKeyId "$TENCENT_SECRET_ID" --apiKey "$TENCENT_SECRET_KEY"
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}

      - name: Deploy backend function
        run: tcb fn deploy df-api --dir backend --force --httpFn --path /api --env-id "$TCB_ENV_ID"
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}

      - name: Deploy frontend hosting
        run: tcb hosting deploy frontend/dist / --env-id "$TCB_ENV_ID"
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
